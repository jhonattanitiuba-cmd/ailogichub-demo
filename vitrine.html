<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AiLogic Hub · Vitrine de Imóveis</title>
<link rel="stylesheet" href="/tokens.css">
<link rel="icon" href="/assets/favicon.png">
<link rel="apple-touch-icon" href="/assets/apple-touch-icon.png">
<meta name="theme-color" content="#0b66ff">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:#f6f9fd;color:#0f172a;-webkit-font-smoothing:antialiased;min-height:100vh}
a{color:inherit;text-decoration:none}
img{max-width:100%;display:block}
.wrap{max-width:1200px;margin:0 auto;padding:0 20px}
/* header */
.hdr{position:sticky;top:0;z-index:30;background:rgba(246,249,253,.85);backdrop-filter:blur(10px);border-bottom:1px solid #e6edf7}
.hdr-in{max-width:1200px;margin:0 auto;padding:14px 20px;display:flex;align-items:center;gap:14px;flex-wrap:wrap}
.brand{display:flex;align-items:center;gap:11px;flex:none}
.brand .mk{width:40px;height:40px;border-radius:11px;overflow:hidden;box-shadow:0 6px 16px rgba(6,25,54,.18)}
.brand strong{display:block;font-size:16px;font-weight:800;letter-spacing:-.01em;color:#0f172a}
.brand span{display:block;font-size:10.5px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:#0b66ff}
.tools{display:flex;gap:10px;align-items:center;margin-left:auto;flex-wrap:wrap}
.search{position:relative}
.search svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);width:17px;height:17px;color:#94a3b8}
.search input{height:42px;width:240px;max-width:52vw;border:1px solid #d9e2ef;border-radius:12px;padding:0 14px 0 38px;font:inherit;font-size:14px;background:#fff;color:#0f172a;outline:none;transition:border .15s,box-shadow .15s}
.search input:focus{border-color:#0b66ff;box-shadow:0 0 0 4px rgba(11,102,255,.12)}
.sel{height:42px;border:1px solid #d9e2ef;border-radius:12px;padding:0 12px;font:inherit;font-size:14px;font-weight:600;background:#fff;color:#334155;outline:none;cursor:pointer}
/* chips */
.chips{display:flex;gap:8px;overflow-x:auto;padding:14px 0 4px;scrollbar-width:none}
.chips::-webkit-scrollbar{display:none}
.chip{flex:none;padding:8px 15px;border-radius:999px;background:#fff;border:1px solid #d9e2ef;font-size:13px;font-weight:700;color:#475569;cursor:pointer;white-space:nowrap;transition:.15s}
.chip:hover{border-color:#0b66ff;color:#0b66ff}
.chip.active{background:#0b66ff;border-color:#0b66ff;color:#fff}
.count{color:#64748b;font-size:13px;font-weight:600;padding:10px 2px 2px}
/* grid */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:22px;padding:8px 0 60px}
.card{background:#fff;border:1px solid #eaf0f9;border-radius:18px;overflow:hidden;box-shadow:0 8px 22px rgba(15,23,42,.05);cursor:pointer;transition:transform .18s,box-shadow .18s;display:flex;flex-direction:column}
.card:hover{transform:translateY(-4px);box-shadow:0 18px 40px rgba(15,23,42,.12)}
.media{position:relative;aspect-ratio:4/3;overflow:hidden;background:#0a1f45}
.media img{width:100%;height:100%;object-fit:cover;transition:transform .4s}
.card:hover .media img{transform:scale(1.05)}
/* placeholder elegante sem foto */
.ph{position:absolute;inset:0;display:grid;place-items:center;background:linear-gradient(150deg,#0a2a5e 0%,#0b66ff 130%);overflow:hidden}
.ph::before{content:"";position:absolute;inset:0;background-image:linear-gradient(rgba(255,255,255,.06) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.06) 1px,transparent 1px);background-size:26px 26px;mask-image:radial-gradient(circle at 60% 20%,#000,transparent 78%)}
.ph .pic{position:relative;width:58px;height:58px;color:rgba(255,255,255,.92);filter:drop-shadow(0 6px 14px rgba(0,0,0,.25))}
.ph .wm{position:absolute;right:12px;bottom:10px;font-size:10px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:rgba(255,255,255,.5)}
.badge-fin{position:absolute;left:12px;top:12px;z-index:2;font-size:11px;font-weight:800;padding:6px 11px;border-radius:999px;color:#fff;background:#0b66ff;box-shadow:0 6px 16px rgba(11,102,255,.35)}
.badge-fin.locacao{background:#16a56f;box-shadow:0 6px 16px rgba(22,165,111,.35)}
.badge-fin.temporada{background:#7257ff;box-shadow:0 6px 16px rgba(114,87,255,.35)}
.fav{position:absolute;right:10px;top:10px;z-index:2;width:36px;height:36px;border:0;border-radius:50%;background:rgba(255,255,255,.9);display:grid;place-items:center;cursor:pointer;color:#334155;box-shadow:0 4px 12px rgba(0,0,0,.15);transition:.15s}
.fav:hover{transform:scale(1.08)}
.fav svg{width:18px;height:18px}
.fav.on{background:#e94242;color:#fff}
.nph{position:absolute;left:10px;bottom:10px;z-index:2;font-size:10.5px;font-weight:700;color:#fff;background:rgba(3,10,25,.45);padding:4px 9px;border-radius:999px;backdrop-filter:blur(4px)}
.info{padding:14px 15px 16px;display:flex;flex-direction:column;gap:8px;flex:1}
.price{font-size:20px;font-weight:900;letter-spacing:-.02em;color:#0f172a}
.price small{font-size:12px;font-weight:600;color:#64748b}
.ttl{font-size:14.5px;font-weight:700;line-height:1.3;color:#172554;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.loc{font-size:12.5px;color:#64748b;display:flex;align-items:center;gap:5px}
.loc svg{width:14px;height:14px;flex:none;color:#94a3b8}
.specs{display:flex;flex-wrap:wrap;gap:12px;margin-top:2px;padding-top:11px;border-top:1px solid #f0f4fa}
.spec{display:flex;align-items:center;gap:5px;font-size:12.5px;font-weight:600;color:#475569}
.spec svg{width:16px;height:16px;color:#94a3b8}
.by{font-size:11.5px;color:#94a3b8;margin-top:2px}
.by b{color:#64748b;font-weight:700}
/* estados */
.state{text-align:center;padding:80px 20px;color:#64748b}
.state svg{width:48px;height:48px;color:#c3d2e8;margin-bottom:14px}
.state h2{font-size:19px;font-weight:800;color:#334155;margin-bottom:6px}
.state p{font-size:14px;line-height:1.6;max-width:360px;margin:0 auto}
.sk{background:#fff;border:1px solid #eaf0f9;border-radius:18px;overflow:hidden}
.sk .m{aspect-ratio:4/3;background:linear-gradient(100deg,#eef3fa 30%,#f6f9fd 50%,#eef3fa 70%);background-size:200% 100%;animation:sh 1.3s infinite}
.sk .l{height:14px;margin:14px 15px;border-radius:6px;background:linear-gradient(100deg,#eef3fa 30%,#f6f9fd 50%,#eef3fa 70%);background-size:200% 100%;animation:sh 1.3s infinite}
.sk .l.s{width:55%}
@keyframes sh{to{background-position:-200% 0}}
/* modal */
.mbg{position:fixed;inset:0;z-index:60;background:rgba(6,25,54,.55);backdrop-filter:blur(4px);display:none;align-items:center;justify-content:center;padding:20px}
.mbg.open{display:flex}
.modal{background:#fff;border-radius:20px;width:760px;max-width:100%;max-height:92vh;overflow:auto;box-shadow:0 40px 90px rgba(6,25,54,.4)}
.gal{position:relative;aspect-ratio:16/10;background:#0a1f45;overflow:hidden}
.gal img{width:100%;height:100%;object-fit:cover}
.gal .ph{position:absolute;inset:0}
.gal .pic{width:76px;height:76px}
.gnav{position:absolute;top:50%;transform:translateY(-50%);width:40px;height:40px;border:0;border-radius:50%;background:rgba(255,255,255,.92);display:grid;place-items:center;cursor:pointer;color:#0f172a;box-shadow:0 6px 16px rgba(0,0,0,.2)}
.gnav.prev{left:12px}.gnav.next{right:12px}.gnav svg{width:20px;height:20px}
.gdots{position:absolute;bottom:12px;left:0;right:0;display:flex;justify-content:center;gap:6px}
.gdots i{width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,.5)}.gdots i.on{background:#fff}
.mclose{position:absolute;right:12px;top:12px;z-index:3;width:38px;height:38px;border:0;border-radius:50%;background:rgba(255,255,255,.92);display:grid;place-items:center;cursor:pointer;font-size:20px;color:#334155;box-shadow:0 4px 12px rgba(0,0,0,.15)}
.mbody{padding:22px 24px 24px}
.mbody .mtags{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:10px}
.mtag{font-size:11px;font-weight:800;padding:5px 11px;border-radius:999px;background:#eaf2ff;color:#0b66ff}
.mbody h2{font-size:22px;font-weight:800;letter-spacing:-.02em;color:#0f172a;margin-bottom:4px}
.mbody .mloc{font-size:14px;color:#64748b;margin-bottom:14px}
.mbody .mprice{font-size:26px;font-weight:900;letter-spacing:-.02em;color:#0b66ff;margin-bottom:16px}
.mspecs{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:18px}
.mspec{display:flex;align-items:center;gap:7px;font-size:13.5px;font-weight:600;color:#334155;background:#f6f9fd;border:1px solid #eaf0f9;padding:9px 13px;border-radius:12px}
.mspec svg{width:17px;height:17px;color:#0b66ff}
.mdesc{font-size:14px;line-height:1.65;color:#475569;margin-bottom:20px;white-space:pre-line}
.mfoot{display:flex;align-items:center;gap:12px;flex-wrap:wrap;border-top:1px solid #f0f4fa;padding-top:16px}
.mfoot .mby{font-size:13px;color:#64748b}.mfoot .mby b{color:#0f172a}
.cta{margin-left:auto;height:46px;padding:0 22px;border:0;border-radius:13px;background:linear-gradient(135deg,#0b66ff,#074cd1);color:#fff;font:inherit;font-weight:800;font-size:14px;cursor:pointer;display:inline-flex;align-items:center;gap:8px;box-shadow:0 12px 26px rgba(11,102,255,.3)}
.cta svg{width:18px;height:18px}
@media(max-width:560px){.brand span{display:none}.search input{width:150px}.mbody{padding:18px}.mfoot .cta{margin-left:0;width:100%;justify-content:center}}
</style>
</head>
<body>
<header class="hdr">
  <div class="hdr-in">
    <a class="brand" href="/vitrine"><span class="mk"><img src="/assets/logo-mark.png" alt="AiLogic Hub"></span><span><strong>AiLogic Hub</strong><span>Vitrine de Imóveis</span></span></a>
    <div class="tools">
      <label class="search"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4-4"/></svg><input id="q" type="search" placeholder="Buscar por título, bairro ou cidade"></label>
      <select class="sel" id="fFin"><option value="">Todas as finalidades</option><option value="venda">Venda</option><option value="locacao">Locação</option><option value="temporada">Temporada</option></select>
    </div>
  </div>
</header>

<div class="wrap">
  <div class="chips" id="chips"></div>
  <div class="count" id="count"></div>
  <div class="grid" id="grid"></div>
</div>

<!-- modal detalhe -->
<div class="mbg" id="mbg"><div class="modal" id="modal"></div></div>

<script>
(function(){
  var grid=document.getElementById('grid'),chipsEl=document.getElementById('chips'),
      countEl=document.getElementById('count'),mbg=document.getElementById('mbg'),modal=document.getElementById('modal');
  var all=[],list=[],bairro='',fin='',q='',fav={},gIdx=0,gCur=null;
  try{fav=JSON.parse(localStorage.getItem('vitrine_fav')||'{}');}catch(_){}

  function esc(s){return String(s==null?'':s).replace(/[&<>"']/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];});}
  function cap(s){s=String(s||'');return s?s.charAt(0).toUpperCase()+s.slice(1):'';}
  function brl(v){return v==null?'Sob consulta':'R$ '+Math.round(v).toLocaleString('pt-BR');}
  function finLabel(f){f=(f||'').toLowerCase();return f==='locacao'?'Locação':f==='temporada'?'Temporada':'Venda';}
  function fotosOf(p){return (p.fotos&&p.fotos.length?p.fotos:(p.foto?[p.foto]:[])).filter(Boolean);}

  var IC={
    pin:"<svg viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><path d='M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z'/><circle cx='12' cy='10' r='2.5'/></svg>",
    dorm:"<svg viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='1.8' stroke-linecap='round' stroke-linejoin='round'><path d='M3 18v-6a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2v6M3 14h18M6 10V8a2 2 0 0 1 2-2h8a2 2 0 0 1 2 2v2M3 18v2M21 18v2'/></svg>",
    suite:"<svg viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='1.8' stroke-linecap='round' stroke-linejoin='round'><path d='M12 3l9 6v12H3V9l9-6Z'/><path d='M9 21v-6h6v6'/></svg>",
    banho:"<svg viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='1.8' stroke-linecap='round' stroke-linejoin='round'><path d='M4 12h16v3a4 4 0 0 1-4 4H8a4 4 0 0 1-4-4v-3Z'/><path d='M6 12V6a2 2 0 0 1 2-2 2 2 0 0 1 2 2'/><path d='M8 19l-1 2M17 19l1 2'/></svg>",
    vaga:"<svg viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='1.8' stroke-linecap='round' stroke-linejoin='round'><path d='M5 13l1.5-4.5A2 2 0 0 1 8.4 7h7.2a2 2 0 0 1 1.9 1.5L19 13v5h-3v-2H8v2H5v-5Z'/><circle cx='7.5' cy='15.5' r='.6'/><circle cx='16.5' cy='15.5' r='.6'/></svg>",
    area:"<svg viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='1.8' stroke-linecap='round' stroke-linejoin='round'><path d='M4 4h16v16H4z'/><path d='M9 4v3M4 9h3M15 20v-3M20 15h-3'/></svg>",
    heart:"<svg viewBox='0 0 24 24' fill='FILL' stroke='currentColor' stroke-width='1.8'><path d='M12 21s-7-4.5-9.5-9A5.2 5.2 0 0 1 12 6a5.2 5.2 0 0 1 9.5 6c-2.5 4.5-9.5 9-9.5 9Z'/></svg>",
    casa:"<svg viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='1.6' stroke-linecap='round' stroke-linejoin='round'><path d='M3 11l9-7 9 7'/><path d='M5 10v10h14V10'/><path d='M9 20v-6h6v6'/></svg>",
    predio:"<svg viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='1.6' stroke-linecap='round' stroke-linejoin='round'><path d='M4 21V5a1 1 0 0 1 1-1h9a1 1 0 0 1 1 1v16'/><path d='M15 21V9h4a1 1 0 0 1 1 1v11'/><path d='M8 8h3M8 12h3M8 16h3'/></svg>",
    terreno:"<svg viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='1.6' stroke-linecap='round' stroke-linejoin='round'><path d='M3 20h18'/><path d='M5 20l3-9 4 4 3-7 4 12'/></svg>"
  };
  function typeIcon(t){t=(t||'').toLowerCase();if(/casa|sobrado/.test(t))return IC.casa;if(/terreno|lote/.test(t))return IC.terreno;return IC.predio;}
  function spec(ic,v,suf){if(v==null||v===''||v===0)return '';return '<span class="spec">'+ic+'<span>'+(v+(suf||''))+'</span></span>';}
  function media(p,big){
    var fs=fotosOf(p);
    if(fs.length)return '<img src="'+esc(fs[0])+'" alt="'+esc(p.titulo||'Imóvel')+'" loading="lazy">'+(!big&&fs.length>1?'<span class="nph">'+fs.length+' fotos</span>':'');
    return '<div class="ph"><span class="pic">'+typeIcon(p.tipo)+'</span><span class="wm">AiLogic Hub</span></div>';
  }

  function cardHTML(p,i){
    var loc=[p.bairro,p.cidade].filter(Boolean).join(', ');
    var finc=(p.finalidade||'').toLowerCase();
    var specs=spec(IC.dorm,p.quartos,' dorm')+spec(IC.banho,p.banheiros,' banh')+spec(IC.vaga,p.vagas,' vaga')+spec(IC.area,p.area,' m²');
    var on=fav[p.id]?' on':'';
    return '<article class="card" data-i="'+i+'">'
      +'<div class="media"><span class="badge-fin '+finc+'">'+esc(finLabel(p.finalidade))+'</span>'
        +'<button class="fav'+on+'" data-fav="'+esc(p.id)+'" title="Favoritar">'+IC.heart.replace('FILL',fav[p.id]?'currentColor':'none')+'</button>'
        +media(p,false)+'</div>'
      +'<div class="info">'
        +'<div class="price">'+esc(brl(p.preco))+(finc==='locacao'?' <small>/mês</small>':'')+'</div>'
        +'<div class="ttl">'+esc(p.titulo||cap(p.tipo)||'Imóvel')+'</div>'
        +(loc?'<div class="loc">'+IC.pin+esc(loc)+'</div>':'')
        +(specs?'<div class="specs">'+specs+'</div>':'')
        +(p.imobiliaria?'<div class="by">por <b>'+esc(p.imobiliaria)+'</b></div>':'')
      +'</div></article>';
  }

  function render(){
    countEl.textContent=list.length?(list.length+(list.length>1?' imóveis disponíveis':' imóvel disponível')):'';
    if(!list.length){
      grid.style.display='block';
      grid.innerHTML='<div class="state">'+IC.predio+'<h2>'+(all.length?'Nada por aqui':'Vitrine em preparação')+'</h2><p>'+(all.length?'Nenhum imóvel corresponde aos filtros. Ajuste a busca ou toque em Todos.':'Em breve novos imóveis disponíveis nesta vitrine.')+'</p></div>';
      return;
    }
    grid.style.display='grid';
    grid.innerHTML=list.map(cardHTML).join('');
    Array.prototype.forEach.call(grid.querySelectorAll('.card'),function(c){
      c.addEventListener('click',function(){openModal(list[+c.getAttribute('data-i')]);});
    });
    Array.prototype.forEach.call(grid.querySelectorAll('.fav'),function(b){
      b.addEventListener('click',function(e){e.stopPropagation();var id=b.getAttribute('data-fav');fav[id]=!fav[id];persist();b.classList.toggle('on',fav[id]);b.innerHTML=IC.heart.replace('FILL',fav[id]?'currentColor':'none');});
    });
  }
  function persist(){try{localStorage.setItem('vitrine_fav',JSON.stringify(fav));}catch(_){}}

  // ---- modal ----
  function galHTML(p){
    var fs=fotosOf(p);
    if(!fs.length)return '<div class="gal"><div class="ph"><span class="pic">'+typeIcon(p.tipo)+'</span><span class="wm">AiLogic Hub</span></div><button class="mclose" id="mx">×</button></div>';
    var dots=fs.length>1?'<div class="gdots">'+fs.map(function(_,i){return '<i class="'+(i===0?'on':'')+'"></i>';}).join('')+'</div>':'';
    var nav=fs.length>1?'<button class="gnav prev" id="gp"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg></button><button class="gnav next" id="gn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M9 6l6 6-6 6"/></svg></button>':'';
    return '<div class="gal"><img id="gimg" src="'+esc(fs[0])+'" alt="'+esc(p.titulo||'')+'">'+nav+dots+'<button class="mclose" id="mx">×</button></div>';
  }
  function openModal(p){
    gCur=p;gIdx=0;var fs=fotosOf(p);
    var loc=[p.bairro,p.cidade].filter(Boolean).join(', ');
    var finc=(p.finalidade||'').toLowerCase();
    var specs=spec(IC.dorm,p.quartos,' dormitórios').replace('spec','mspec')
      +spec(IC.suite,p.suites,' suítes').replace('spec','mspec')
      +spec(IC.banho,p.banheiros,' banheiros').replace('spec','mspec')
      +spec(IC.vaga,p.vagas,' vagas').replace('spec','mspec')
      +spec(IC.area,p.area,' m²').replace('spec','mspec');
    modal.innerHTML=galHTML(p)
      +'<div class="mbody">'
        +'<div class="mtags"><span class="mtag">'+esc(finLabel(p.finalidade))+'</span>'+(p.tipo?'<span class="mtag">'+esc(cap(p.tipo))+'</span>':'')+(p.codigo?'<span class="mtag">Cód. '+esc(p.codigo)+'</span>':'')+'</div>'
        +'<h2>'+esc(p.titulo||cap(p.tipo)||'Imóvel')+'</h2>'
        +(loc?'<div class="mloc">'+esc(loc)+'</div>':'')
        +'<div class="mprice">'+esc(brl(p.preco))+(finc==='locacao'?' <span style="font-size:15px;color:#64748b;font-weight:600">/mês</span>':'')+'</div>'
        +(specs?'<div class="mspecs">'+specs+'</div>':'')
        +(p.descricao?'<div class="mdesc">'+esc(p.descricao)+'</div>':'')
        +'<div class="mfoot">'+(p.imobiliaria?'<div class="mby">Anunciado por <b>'+esc(p.imobiliaria)+'</b></div>':'')
          +'<button class="cta" id="cta"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16v12H5.2L4 17.2V4Z"/><path d="M8 9h8M8 12h5"/></svg>Tenho interesse</button>'
        +'</div>'
      +'</div>';
    mbg.classList.add('open');document.body.style.overflow='hidden';
    var x=document.getElementById('mx');if(x)x.onclick=closeModal;
    var cta=document.getElementById('cta');if(cta)cta.onclick=function(){share(p);};
    if(fs.length>1){
      var img=document.getElementById('gimg'),dots=modal.querySelectorAll('.gdots i');
      function show(i){gIdx=(i+fs.length)%fs.length;img.src=fs[gIdx];dots.forEach(function(d,k){d.classList.toggle('on',k===gIdx);});}
      document.getElementById('gp').onclick=function(){show(gIdx-1);};
      document.getElementById('gn').onclick=function(){show(gIdx+1);};
    }
  }
  function closeModal(){mbg.classList.remove('open');document.body.style.overflow='';}
  mbg.addEventListener('click',function(e){if(e.target===mbg)closeModal();});
  document.addEventListener('keydown',function(e){if(e.key==='Escape')closeModal();});
  function share(p){
    var txt=(p.titulo||'Imóvel')+(p.cidade?' - '+p.cidade:'')+' | '+brl(p.preco)+' | AiLogic Hub';
    if(navigator.share){navigator.share({title:'AiLogic Hub',text:txt,url:location.href}).catch(function(){});}
    else if(navigator.clipboard){navigator.clipboard.writeText(txt+' '+location.href).then(function(){toast('Link do imóvel copiado');}).catch(function(){});}
    else toast('Fale com '+(p.imobiliaria||'a imobiliária'));
  }
  function toast(m){var t=document.createElement('div');t.textContent=m;t.style.cssText='position:fixed;left:50%;bottom:28px;transform:translateX(-50%);background:#0f172a;color:#fff;padding:11px 18px;border-radius:999px;font-size:13px;font-weight:700;z-index:80;box-shadow:0 10px 30px rgba(0,0,0,.3)';document.body.appendChild(t);setTimeout(function(){t.remove();},1800);}

  // ---- filtros ----
  function buildChips(){
    var bs={};all.forEach(function(p){if(p.bairro)bs[p.bairro]=(bs[p.bairro]||0)+1;});
    var items=['<button class="chip'+(bairro===''?' active':'')+'" data-b="">Todos</button>']
      .concat(Object.keys(bs).sort().map(function(b){return '<button class="chip'+(bairro===b?' active':'')+'" data-b="'+esc(b)+'">'+esc(b)+'</button>';}));
    chipsEl.innerHTML=items.join('');
    chipsEl.querySelectorAll('.chip').forEach(function(c){c.addEventListener('click',function(){bairro=c.getAttribute('data-b');chipsEl.querySelectorAll('.chip').forEach(function(x){x.classList.toggle('active',x===c);});apply();});});
  }
  function apply(){
    list=all.filter(function(p){
      if(bairro&&p.bairro!==bairro)return false;
      if(fin&&String(p.finalidade||'').toLowerCase()!==fin)return false;
      if(q){var hay=((p.titulo||'')+' '+(p.bairro||'')+' '+(p.cidade||'')+' '+(p.codigo||'')).toLowerCase();if(hay.indexOf(q)<0)return false;}
      return true;
    });
    render();
  }
  document.getElementById('q').addEventListener('input',function(){q=this.value.trim().toLowerCase();apply();});
  document.getElementById('fFin').addEventListener('change',function(){fin=this.value;apply();});

  // ---- carregar ----
  grid.innerHTML=Array.from({length:6}).map(function(){return '<div class="sk"><div class="m"></div><div class="l"></div><div class="l s"></div></div>';}).join('');
  fetch('/api/vitrine',{cache:'no-store'}).then(function(r){return r.json();}).then(function(d){
    all=(d&&d.rows)||[];buildChips();apply();
  }).catch(function(){
    grid.style.display='block';
    grid.innerHTML='<div class="state">'+IC.predio+'<h2>Não foi possível carregar</h2><p>Tente novamente em instantes.</p></div>';
  });
})();
</script>
</body>
</html>
