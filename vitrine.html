<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>AiLogic Hub · Vitrine de Imóveis</title>
<link rel="stylesheet" href="/tokens.css">
<link rel="icon" href="/assets/favicon.png">
<link rel="apple-touch-icon" href="/assets/apple-touch-icon.png">
<meta name="theme-color" content="#061936">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;background:#061936;font-family:var(--font);color:#fff;-webkit-font-smoothing:antialiased}
a{color:inherit;text-decoration:none}
/* topo */
.top{position:fixed;top:0;left:0;right:0;z-index:20;display:flex;align-items:center;gap:10px;padding:14px 16px calc(14px + env(safe-area-inset-top));background:linear-gradient(180deg,rgba(6,25,54,.85),rgba(6,25,54,0))}
.top .mk{width:34px;height:34px;border-radius:10px;overflow:hidden;flex:none;box-shadow:0 6px 16px rgba(0,0,0,.35)}
.top .mk img{width:100%;height:100%;object-fit:cover;display:block}
.top .tt-name{font-weight:800;font-size:15px;letter-spacing:-.01em}
.top .tt-sub{font-size:10.5px;color:#a8c2ee;letter-spacing:.1em;text-transform:uppercase}
/* chips de bairro */
.chips{position:fixed;top:calc(58px + env(safe-area-inset-top));left:0;right:0;z-index:19;display:flex;gap:8px;padding:6px 16px;overflow-x:auto;scrollbar-width:none}
.chips::-webkit-scrollbar{display:none}
.chip{flex:none;padding:7px 14px;border-radius:999px;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.14);font-size:12.5px;font-weight:700;color:#dce8ff;cursor:pointer;white-space:nowrap;backdrop-filter:blur(6px)}
.chip.active{background:var(--blue);border-color:var(--blue);color:#fff}
/* feed */
.feed{position:fixed;inset:0;overflow:hidden}
.strip{height:100%;transition:transform .45s cubic-bezier(.22,.61,.36,1)}
.slide{position:relative;height:100%;width:100%;overflow:hidden;display:flex;flex-direction:column;justify-content:flex-end}
.ph{position:absolute;inset:0;background-size:cover;background-position:center;opacity:0;transition:opacity .7s ease;transform:scale(1.04);animation:ken 12s ease-in-out infinite alternate}
.ph.on{opacity:1}
.ph.noimg{background:linear-gradient(160deg,#0a2a5e,#071b3a 55%,#030d20);animation:none}
@keyframes ken{from{transform:scale(1.02)}to{transform:scale(1.13)}}
.scrim{position:absolute;inset:0;background:linear-gradient(180deg,rgba(6,25,54,.15) 0%,rgba(6,25,54,0) 30%,rgba(3,10,25,.55) 70%,rgba(3,10,25,.92) 100%)}
.body{position:relative;z-index:2;padding:20px 78px 34px 20px;padding-bottom:calc(34px + env(safe-area-inset-bottom))}
.tags{display:flex;gap:7px;margin-bottom:12px;flex-wrap:wrap}
.tag{font-size:11px;font-weight:800;padding:5px 11px;border-radius:999px;background:rgba(255,255,255,.14);border:1px solid rgba(255,255,255,.18);backdrop-filter:blur(6px);letter-spacing:.02em}
.tag.fin{background:var(--blue);border-color:var(--blue)}
.tag.temp{background:var(--green);border-color:var(--green)}
.title{font-size:24px;line-height:1.15;font-weight:800;letter-spacing:-.02em;margin-bottom:6px;text-shadow:0 2px 14px rgba(0,0,0,.4)}
.loc{font-size:13.5px;color:#cfe0ff;margin-bottom:14px}
.price{display:inline-flex;align-items:baseline;gap:6px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.16);padding:8px 14px;border-radius:14px;backdrop-filter:blur(8px);margin-bottom:14px}
.price b{font-size:22px;font-weight:900;letter-spacing:-.02em}
.price small{font-size:11px;color:#bcd2f5}
.specs{display:flex;gap:16px;flex-wrap:wrap;margin-bottom:14px}
.spec{display:flex;align-items:center;gap:6px;font-size:13px;font-weight:600;color:#e6eeff}
.spec svg{width:17px;height:17px;opacity:.85}
.desc{font-size:13px;line-height:1.5;color:#c4d4f0;max-width:560px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.by{margin-top:12px;font-size:11.5px;color:#8fb0e6}
.by b{color:#cfe0ff;font-weight:700}
/* trilha lateral */
.rail{position:absolute;right:12px;bottom:calc(34px + env(safe-area-inset-bottom));z-index:3;display:flex;flex-direction:column;gap:16px;align-items:center}
.rbtn{display:flex;flex-direction:column;align-items:center;gap:3px;background:none;border:0;color:#fff;cursor:pointer;font:inherit}
.rbtn .ic{width:46px;height:46px;border-radius:50%;background:rgba(255,255,255,.14);border:1px solid rgba(255,255,255,.16);display:grid;place-items:center;backdrop-filter:blur(8px);transition:transform .12s,background .15s}
.rbtn:active .ic{transform:scale(.9)}
.rbtn.on .ic{background:var(--blue);border-color:var(--blue)}
.rbtn.on.like .ic{background:var(--red);border-color:var(--red)}
.rbtn svg{width:22px;height:22px}
.rbtn small{font-size:11px;font-weight:700;color:#dce8ff}
/* indicadores de foto */
.dots{position:absolute;top:0;left:0;right:0;z-index:3;display:flex;gap:4px;padding:10px 14px calc(10px + env(safe-area-inset-top))}
.dots i{flex:1;height:3px;border-radius:2px;background:rgba(255,255,255,.28)}
.dots i.on{background:#fff}
/* estados */
.state{position:fixed;inset:0;display:grid;place-items:center;text-align:center;padding:30px;z-index:5}
.state .box{max-width:320px}
.state h2{font-size:20px;font-weight:800;margin-bottom:8px}
.state p{font-size:14px;color:#a8c2ee;line-height:1.6}
.spin{width:34px;height:34px;border:3px solid rgba(255,255,255,.2);border-top-color:#fff;border-radius:50%;animation:sp 1s linear infinite;margin:0 auto 14px}
@keyframes sp{to{transform:rotate(360deg)}}
.hint{position:fixed;left:0;right:0;bottom:calc(14px + env(safe-area-inset-bottom));z-index:6;text-align:center;font-size:12px;color:#9fb8e6;pointer-events:none;opacity:.85;animation:fade 3s ease forwards;animation-delay:2.5s}
@keyframes fade{to{opacity:0}}
@media(min-width:760px){.body{padding-left:max(20px,calc(50vw - 300px));padding-right:max(78px,calc(50vw - 300px))}}
</style>
</head>
<body>
<div class="top">
  <div class="mk"><img src="/assets/logo-mark.png" alt="AiLogic Hub"></div>
  <div><div class="tt-name">AiLogic Hub</div><div class="tt-sub">Vitrine de Imóveis</div></div>
</div>
<div class="chips" id="chips"></div>

<div class="feed" id="feed"><div class="strip" id="strip"></div></div>

<div class="state" id="state"><div class="box"><div class="spin"></div><p>Carregando imóveis...</p></div></div>
<div class="hint" id="hint">Deslize para cima para ver mais</div>

<script>
(function(){
  var strip=document.getElementById('strip'),feed=document.getElementById('feed'),
      chipsEl=document.getElementById('chips'),stateEl=document.getElementById('state'),hintEl=document.getElementById('hint');
  var all=[],list=[],idx=0,bairro='',photoTimers=[];
  var liked={},saved={};
  try{liked=JSON.parse(localStorage.getItem('vitrine_liked')||'{}');saved=JSON.parse(localStorage.getItem('vitrine_saved')||'{}');}catch(_){}

  function esc(s){return String(s==null?'':s).replace(/[&<>"']/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];});}
  function cap(s){s=String(s||'');return s?s.charAt(0).toUpperCase()+s.slice(1):'';}
  function brl(v){return v==null?'Sob consulta':'R$ '+Math.round(v).toLocaleString('pt-BR');}
  function finLabel(f){f=(f||'').toLowerCase();return f==='locacao'?'Locação':f==='temporada'?'Temporada':'Venda';}

  var IC={
    dorm:"<svg viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='1.8' stroke-linecap='round' stroke-linejoin='round'><path d='M3 18v-6a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2v6M3 14h18M6 10V8a2 2 0 0 1 2-2h8a2 2 0 0 1 2 2v2M3 18v2M21 18v2'/></svg>",
    suite:"<svg viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='1.8' stroke-linecap='round' stroke-linejoin='round'><path d='M12 3l9 6v12H3V9l9-6Z'/><path d='M9 21v-6h6v6'/></svg>",
    banho:"<svg viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='1.8' stroke-linecap='round' stroke-linejoin='round'><path d='M4 12h16v3a4 4 0 0 1-4 4H8a4 4 0 0 1-4-4v-3Z'/><path d='M6 12V6a2 2 0 0 1 2-2 2 2 0 0 1 2 2'/><path d='M8 19l-1 2M17 19l1 2'/></svg>",
    vaga:"<svg viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='1.8' stroke-linecap='round' stroke-linejoin='round'><path d='M5 13l1.5-4.5A2 2 0 0 1 8.4 7h7.2a2 2 0 0 1 1.9 1.5L19 13v5h-3v-2H8v2H5v-5Z'/><circle cx='7.5' cy='15.5' r='.6'/><circle cx='16.5' cy='15.5' r='.6'/></svg>",
    area:"<svg viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='1.8' stroke-linecap='round' stroke-linejoin='round'><path d='M4 4h16v16H4z'/><path d='M9 4v3M4 9h3M15 20v-3M20 15h-3'/></svg>"
  };
  function spec(ic,v,suf){if(!v)return '';return '<span class="spec">'+ic+(v+(suf||''))+'</span>';}

  function slideHTML(p){
    var fotos=(p.fotos&&p.fotos.length?p.fotos:(p.foto?[p.foto]:[]));
    var phs=fotos.length?fotos.map(function(u,i){return '<div class="ph'+(i===0?' on':'')+'" style="background-image:url('+JSON.stringify(u)+')"></div>';}).join('')
                        :'<div class="ph on noimg"></div>';
    var dots=fotos.length>1?'<div class="dots">'+fotos.map(function(_,i){return '<i class="'+(i===0?'on':'')+'"></i>';}).join('')+'</div>':'';
    var finCls=(p.finalidade||'').toLowerCase()==='temporada'?'temp':'fin';
    var specs=spec(IC.dorm,p.quartos,' dorm')+spec(IC.suite,p.suites,' suíte')+spec(IC.banho,p.banheiros,' banh')+spec(IC.vaga,p.vagas,' vaga')+spec(IC.area,p.area,' m²');
    var loc=[p.bairro,p.cidade].filter(Boolean).join(', ');
    var k=p.id;
    return '<section class="slide" data-id="'+esc(k)+'">'+phs+dots+'<div class="scrim"></div>'
      +'<div class="rail">'
        +'<button class="rbtn like'+(liked[k]?' on':'')+'" data-act="like"><span class="ic"><svg viewBox="0 0 24 24" fill="'+(liked[k]?'currentColor':'none')+'" stroke="currentColor" stroke-width="1.8"><path d="M12 21s-7-4.5-9.5-9A5.2 5.2 0 0 1 12 6a5.2 5.2 0 0 1 9.5 6c-2.5 4.5-9.5 9-9.5 9Z"/></svg></span><small>Curtir</small></button>'
        +'<button class="rbtn save'+(saved[k]?' on':'')+'" data-act="save"><span class="ic"><svg viewBox="0 0 24 24" fill="'+(saved[k]?'currentColor':'none')+'" stroke="currentColor" stroke-width="1.8"><path d="M6 3h12a1 1 0 0 1 1 1v17l-7-4-7 4V4a1 1 0 0 1 1-1Z"/></svg></span><small>Salvar</small></button>'
        +'<button class="rbtn" data-act="share"><span class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><path d="M8.6 13.5l6.8 4M15.4 6.5l-6.8 4"/></svg></span><small>Enviar</small></button>'
      +'</div>'
      +'<div class="body">'
        +'<div class="tags"><span class="tag '+finCls+'">'+esc(finLabel(p.finalidade))+'</span>'+(p.tipo?'<span class="tag">'+esc(cap(p.tipo))+'</span>':'')+(p.codigo?'<span class="tag">'+esc(p.codigo)+'</span>':'')+'</div>'
        +'<div class="title">'+esc(p.titulo||'Imóvel')+'</div>'
        +(loc?'<div class="loc">'+esc(loc)+'</div>':'')
        +'<div class="price"><b>'+esc(brl(p.preco))+'</b>'+((p.finalidade||'').toLowerCase()==='locacao'?'<small>/mês</small>':'')+'</div>'
        +(specs?'<div class="specs">'+specs+'</div>':'')
        +(p.descricao?'<div class="desc">'+esc(p.descricao)+'</div>':'')
        +(p.imobiliaria?'<div class="by">por <b>'+esc(p.imobiliaria)+'</b></div>':'')
      +'</div>'
    +'</section>';
  }

  function clearTimers(){photoTimers.forEach(clearInterval);photoTimers=[];}
  function startPhotos(slide){
    var phs=slide.querySelectorAll('.ph');if(phs.length<2)return;
    var dots=slide.querySelectorAll('.dots i');var i=0;
    var t=setInterval(function(){
      phs[i].classList.remove('on');if(dots[i])dots[i].classList.remove('on');
      i=(i+1)%phs.length;
      phs[i].classList.add('on');if(dots[i])dots[i].classList.add('on');
    },2600);
    photoTimers.push(t);
  }

  function render(){
    clearTimers();
    if(!list.length){
      strip.innerHTML='';
      stateEl.style.display='grid';
      stateEl.innerHTML='<div class="box"><h2>Nenhum imóvel por aqui</h2><p>'+(all.length?'Nenhum imóvel neste bairro. Toque em Todos para ver a vitrine completa.':'Em breve novos imóveis disponíveis na vitrine.')+'</p></div>';
      return;
    }
    stateEl.style.display='none';
    strip.innerHTML=list.map(slideHTML).join('');
    idx=Math.min(idx,list.length-1);
    go(idx,true);
    bindRail();
  }

  function go(i,instant){
    idx=Math.max(0,Math.min(i,list.length-1));
    if(instant)strip.style.transition='none';else strip.style.transition='';
    strip.style.transform='translateY('+(-idx*100)+'%)';
    if(instant){void strip.offsetHeight;strip.style.transition='';}
    clearTimers();
    var slide=strip.children[idx];
    if(slide)startPhotos(slide);
  }

  function bindRail(){
    Array.prototype.forEach.call(strip.querySelectorAll('.slide'),function(sl){
      var id=sl.getAttribute('data-id');
      sl.querySelectorAll('.rbtn').forEach(function(b){
        b.addEventListener('click',function(e){
          e.stopPropagation();
          var act=b.getAttribute('data-act');
          if(act==='like'){liked[id]=!liked[id];persist();b.classList.toggle('on',liked[id]);var p=b.querySelector('path');if(p)p.parentNode.setAttribute('fill',liked[id]?'currentColor':'none');}
          else if(act==='save'){saved[id]=!saved[id];persist();b.classList.toggle('on',saved[id]);var s=b.querySelector('path');if(s)s.parentNode.setAttribute('fill',saved[id]?'currentColor':'none');}
          else if(act==='share'){doShare(id);}
        });
      });
    });
  }
  function persist(){try{localStorage.setItem('vitrine_liked',JSON.stringify(liked));localStorage.setItem('vitrine_saved',JSON.stringify(saved));}catch(_){}}
  function doShare(id){
    var p=list[idx]||{};
    var txt=(p.titulo||'Imóvel')+(p.cidade?' - '+p.cidade:'')+' | '+brl(p.preco);
    if(navigator.share){navigator.share({title:'AiLogic Hub',text:txt,url:location.href}).catch(function(){});}
    else if(navigator.clipboard){navigator.clipboard.writeText(txt+' '+location.href).then(function(){toast('Link copiado');}).catch(function(){});}
  }
  function toast(m){var t=document.createElement('div');t.textContent=m;t.style.cssText='position:fixed;left:50%;bottom:90px;transform:translateX(-50%);background:rgba(0,0,0,.8);color:#fff;padding:9px 16px;border-radius:999px;font-size:12.5px;font-weight:700;z-index:30';document.body.appendChild(t);setTimeout(function(){t.remove();},1600);}

  function buildChips(){
    var bs={};all.forEach(function(p){if(p.bairro)bs[p.bairro]=1;});
    var items=['<button class="chip'+(bairro===''?' active':'')+'" data-b="">Todos</button>']
      .concat(Object.keys(bs).sort().map(function(b){return '<button class="chip'+(bairro===b?' active':'')+'" data-b="'+esc(b)+'">'+esc(b)+'</button>';}));
    chipsEl.innerHTML=items.join('');
    chipsEl.querySelectorAll('.chip').forEach(function(c){
      c.addEventListener('click',function(){bairro=c.getAttribute('data-b');idx=0;applyFilter();
        chipsEl.querySelectorAll('.chip').forEach(function(x){x.classList.toggle('active',x===c);});});
    });
  }
  function applyFilter(){list=bairro?all.filter(function(p){return p.bairro===bairro;}):all.slice();render();}

  // navegação
  var wheelLock=false;
  feed.addEventListener('wheel',function(e){
    if(wheelLock||!list.length)return;wheelLock=true;setTimeout(function(){wheelLock=false;},520);
    if(e.deltaY>0)go(idx+1);else if(e.deltaY<0)go(idx-1);
  },{passive:true});
  var ty=null;
  feed.addEventListener('touchstart',function(e){ty=e.touches[0].clientY;},{passive:true});
  feed.addEventListener('touchend',function(e){
    if(ty==null||!list.length)return;var dy=e.changedTouches[0].clientY-ty;ty=null;
    if(Math.abs(dy)<40)return;if(dy<0)go(idx+1);else go(idx-1);
  },{passive:true});
  document.addEventListener('keydown',function(e){
    if(e.key==='ArrowDown'||e.key==='PageDown'){go(idx+1);}
    else if(e.key==='ArrowUp'||e.key==='PageUp'){go(idx-1);}
  });

  // carregar dados
  fetch('/api/vitrine',{cache:'no-store'}).then(function(r){return r.json();}).then(function(d){
    all=(d&&d.rows)||[];
    buildChips();applyFilter();
    if(!all.length){hintEl.style.display='none';}
  }).catch(function(){
    stateEl.style.display='grid';
    stateEl.innerHTML='<div class="box"><h2>Não foi possível carregar</h2><p>Tente novamente em instantes.</p></div>';
    hintEl.style.display='none';
  });
})();
</script>
</body>
</html>
